  - "# Warp S1 Gate Report"
  - "**Spec:** docs/specs/2026-07-04-warp-test-engine-design.md"
  - "**Testbed:** YardPilot worktree (branch warp-s1-poc), DB yardpilot_test_warp, MySQL 8 (Herd), M-series Mac, PHP 8.5.7."
  - "## Gate A — per-test framework tax"
  - "Method: marginal cost via (T800 − T200)/600 on trivial `expect(true)` tests"
  - "under tests/Feature/WarpBench (transaction-wrapped, realistic tax)."
