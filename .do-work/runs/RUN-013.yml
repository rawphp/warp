  - "**Gate A verdict: PASS (threshold: warm ≤ 10ms and classic ≥ 5× warm; spec target ~5ms)**"
  - "## Gate B — outcome parity (tests/Feature/Quotes)"
  - "Method: `bench/parity.sh /Users/tomkaczocha/EA/projects/yardpilot-warp tests/Feature/Quotes`"
  - "runs the suite classic (`WARP_WARM=0`) then warm (`WARP_WARM=1`), each with"
  - "`--log-junit`, and `bench/compare-junit.php` maps every `//testcase` to"
  - "pass/fail/error/skip and exits 0 iff both files agree on every test."
  - "**Result: `PARITY OK` — identical outcomes for all 1,372 tests, classic vs warm.**"
  - "| Mode | Tests | Passed | Todos | Skipped | Failed/Error | Wall-clock |"
  - "|---|---|---|---|---|---|---|"
  - "| Classic (WARP_WARM=0) | 1,372 | 743 | 597 | 32 | 0 | 161.23s |"
  - "| Warm (WARP_WARM=1)    | 1,372 | 743 | 597 | 32 | 0 | 57.46s |"
  - "Final comparer output (verbatim):"
  - "```"
  - "classic: 1372 tests, warm: 1372 tests"
  - "PARITY OK"
  - "```"
  - "Warm ran the identical suite ~2.8× faster wall-clock (161.23s → 57.46s) with"
  - "byte-identical outcomes. (Test count is 1,372, not the plan's estimated ~1,366;"
  - "the suite grew slightly — the parity guarantee holds over whatever the suite is.)"
  - "### Iteration log"
  - "**Iteration 1 (baseline, unmodified `ResetManifest::default()`):** 3 divergences,"
  - "all `classic=pass warm=fail/error`, all in `Tests\Feature\Quotes\ListQuotesTest`:"
  - "| Test | classic | warm |"
  - "|---|---|---|"
  - "| `List Quotes` → it returns second page of results | pass | fail |"
  - "| `List Quotes` → it returns correct pagination links (first, last, prev, next) | pass | error |"
  - "| `List Quotes` → it returns empty data array for page beyond last page | pass | fail |"
  - "Triage: re-ran `it returns second page of results` **alone** warm — still failed"
  - "(`assertJsonCount(5,'data')` got 25). Failing alone ⇒ a warm-mode"
  - "re-resolution gap, **not** an order-coupled leak, so a manifest fix (not a"
  - "sentinel-caught leak, not a quarantine)."
  - "Root cause: `Illuminate\Pagination\PaginationServiceProvider::register()` calls"
  - "`PaginationState::resolveUsing($this->app)` **once at base boot**. That binds the"
  - "static `Paginator` current-page / current-path / query-string / cursor resolvers"
  - "to closures that close over the **base** application's `request`. A warm sandbox"
  - "never re-runs that registration, so every `->paginate()` reads the base app's"
  - "request (which carries no `?page=N`) and silently returns page 1 — the paginator"
  - "was blind to the sandbox's HTTP request. All three failures are the same class"
  - "(page param ignored ⇒ page 1 returned)."
  - "Fix (generalizable ⇒ `ResetManifest::default()` + package unit test): a custom"
  - "step that re-runs `PaginationState::resolveUsing($sandbox)` on every sandbox —"
  - "the exact framework contract the service provider uses at boot, rebinding all"
  - "pagination resolvers to the current sandbox. New unit test:"
  - "`tests/Unit/ResetManifestTest.php` → \"rebinds the paginator current-page resolver"
  - "to the sandbox request via the default manifest\" (asserts"
  - "`Paginator::resolveCurrentPage()` returns 3 for a sandbox request `?page=3`)."
  - "**Iteration 2 (with the pagination manifest step):** `PARITY OK`, 0 divergences."
  - "### Manifest entries added"
  - "- `ResetManifest::default()` — custom step `PaginationState::resolveUsing($sandbox)`"
  - "  (guarded by `class_exists(PaginationState::class)`). Generalizable — applies to"
  - "  any Laravel app that paginates in warm mode. Covered by a new package unit test."
  - "### `warp-isolated` quarantines"
  - "None. Zero tests were quarantined — the single divergence class was fully closed"
  - "by the generalizable manifest fix."
  - "### Machine load"
  - "Quiet — 0 competing pest/phpunit/paratest processes on the yardpilot main"
  - "checkout during both parity runs; system load average ~5–6 on a multi-core"
  - "M-series Mac (background only). Total parity wall-clock ~220s per full run"
  - "(classic + warm + diff). Numbers are representative and, if anything, conservative."
  - "**Gate B verdict: PASS — `PARITY OK`, zero unexplained divergences, one"
  - "generalizable manifest fix (pagination resolver rebind), zero quarantines.**"
  - "## Verdict"
  - "**Gate A (52ms → ≤10ms):** PASS — classic 53.57ms → warm 0.55ms (97.4× reduction)."
  - "**Gate B (outcome parity, Quotes, 1,372 tests):** PASS — PARITY OK, zero unexplained divergences, one generalizable manifest fix (pagination resolver rebind), zero `warp-isolated` quarantines."
  - "**S1 gate: PASSED.** The warm-worker model holds: a single base application boot,"
  - "cloned per test into an isolated sandbox and reset via `ResetManifest`, pays a"
  - "framework tax of 0.55ms/test versus 53.57ms/test for a fresh classic boot"
  - "(97.4× reduction, comfortably past both the ≤10ms warm ceiling and the 5×"
  - "classic-vs-warm requirement) — and it does so with **zero loss of test"
  - "correctness**: all 1,372 tests in `tests/Feature/Quotes` produced byte-identical"
  - "pass/fail/error/skip outcomes under warm vs classic execution, with only one"
  - "class of divergence surfaced during iteration (a Laravel pagination resolver"
  - "bound to the base app's request at boot), which was root-caused and closed with"
  - "a single generalizable manifest step rather than a per-test quarantine. Warm"
  - "mode also ran the full Quotes suite ~2.8× faster wall-clock (161.23s → 57.46s)"
  - "as a byproduct of the same architecture. This proves the core PoC hypothesis —"
  - "that a warm, cloned-and-reset application sandbox can replace a cold Laravel"
  - "boot per test without silently changing test outcomes — and de-risks the"
  - "riskiest unknown of the design (hermetic reset correctness). The recommended"
  - "next step is **S2: golden-snapshot DB provisioning**, i.e. extending the warm"
  - "sandbox model from application state to database state (snapshot/restore"
  - "instead of migrate-per-test) now that the reset-and-clone mechanism itself is"
  - "proven sound."
  - "Reproduce: bench/warm-tax.sh and bench/parity.sh against the yardpilot-warp"
  - "worktree (branch warp-s1-poc)."
